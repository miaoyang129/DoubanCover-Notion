name: Notion Douban Cover Sync

on:
  # 定时任务触发
  schedule:
    # 这里的 cron 表达式使用的是 UTC 时间。
    # '0 2,14 * * *' 表示每天 UTC 时间 2:00 和 14:00 运行（对应北京时间早上 10:00 和晚上 22:00）
    - cron: '0 2,14 * * *'
  
  # 允许在 GitHub 网页端手动点击按钮触发运行，方便调试
  workflow_dispatch: 

jobs:
  update-covers:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 你可以根据本地环境调整版本

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行同步脚本
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: python main.py # 请确保这里的文件名和你的主程序文件名一致
